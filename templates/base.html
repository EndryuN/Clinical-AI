<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MDT Extractor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">&#x1f3e5; MDT Extractor</a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if session_active %}
                <a class="nav-link" href="/process">Process <span id="nav-progress" class="badge bg-primary ms-1 d-none" style="font-size:10px;"></span></a>
                <a class="nav-link" href="/review">Review</a>
                <a class="nav-link" href="/analytics-page">Analytics</a>
                <a class="btn btn-success btn-sm ms-2" href="/export">Export Excel</a>
                <button class="btn btn-outline-danger btn-sm ms-2" onclick="if(confirm('Wipe all data and start over?')){fetch('/reset',{method:'POST'}).then(()=>window.location='/')}">Reset</button>
                {% endif %}
                <button id="theme-toggle" class="ms-2" onclick="toggleTheme()" title="Toggle light/dark mode">&#x263E;</button>
            </div>
        </div>
    </nav>
    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
    // Theme toggle — persists in localStorage
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-bs-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-bs-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcon(next);
    }
    function updateThemeIcon(theme) {
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.innerHTML = theme === 'dark' ? '&#x263E;' : '&#x2600;';
    }
    // Apply saved theme on load
    (function() {
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', saved);
        updateThemeIcon(saved);
    })();

    // Navbar progress badge — polls /status to show extraction progress
    (function() {
        const badge = document.getElementById('nav-progress');
        if (!badge) return;
        let interval = null;
        function poll() {
            fetch('/status').then(r => r.json()).then(d => {
                if (d.status === 'extracting') {
                    badge.textContent = d.current + '/' + d.total;
                    badge.classList.remove('d-none');
                } else if (d.status === 'complete' || d.status === 'stopped') {
                    badge.textContent = d.total + '/' + d.total;
                    badge.classList.remove('d-none', 'bg-primary');
                    badge.classList.add('bg-success');
                    clearInterval(interval);
                } else {
                    badge.classList.add('d-none');
                }
            }).catch(() => {});
        }
        poll();
        interval = setInterval(poll, 3000);
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
